{% extends "base.html" %}

{% block title %}Categorías - {{ SITENAME }}{% endblock %}

{% block content %}
  <section class="archive">
    <h1>Categorías</h1>
    {% for category, articles in categories %}
      <article class="archive-item">
        <span>{{ articles|count }}</span>
        <a href="{{ SITEURL }}/{{ category.url }}">{{ category }}</a>
      </article>
    {% else %}
      <p>Todavía no hay categorías.</p>
    {% endfor %}
  </section>
{% endblock %}
